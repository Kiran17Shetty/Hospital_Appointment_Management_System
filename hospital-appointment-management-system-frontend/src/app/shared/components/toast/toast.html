<div class="toast-container">
  <div
    class="toast toast-{{ t.type }}"
    *ngFor="let t of toasts"
    (click)="dismiss(t.id)">
    <span class="toast-icon" aria-hidden="true">
      <svg *ngIf="t.type === 'success'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <circle cx="10" cy="10" r="9"/><path d="M6.5 10l2.5 2.5 4.5-4.5"/>
      </svg>
      <svg *ngIf="t.type === 'error'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <circle cx="10" cy="10" r="9"/><path d="M7 7l6 6M13 7l-6 6"/>
      </svg>
      <svg *ngIf="t.type === 'info'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <circle cx="10" cy="10" r="9"/><line x1="10" y1="9" x2="10" y2="14"/><circle cx="10" cy="6.5" r="0.5" fill="currentColor"/>
      </svg>
    </span>
    <span class="toast-msg">{{ t.message }}</span>
    <button class="toast-close" (click)="dismiss(t.id)" title="Dismiss">×</button>
  </div>
</div>
